name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (lightweight set — tests don't need torch)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pandas numpy scikit-learn yfinance feedparser streamlit plotly matplotlib joblib xgboost pytest

      - name: Run test suite
        run: pytest tests/ -v

      - name: Smoke-test the offline demo pipeline
        run: |
          python - <<'EOF'
          from src.demo import generate_demo_data
          from src.sentiment import score_headlines, aggregate_daily_sentiment
          from src.features import compute_price_features_from_closes, join_sentiment_with_prices
          from src.ml import add_quick_prob
          from src.backtest import apply_signals, backtest_equal_weight

          news, close = generate_demo_data(["AAPL", "MSFT"], 5, 120)
          scored = score_headlines(news, engine="lexicon")
          daily = aggregate_daily_sentiment(scored)
          X = join_sentiment_with_prices(daily, compute_price_features_from_closes(close))
          Xs = apply_signals(add_quick_prob(X), threshold=0.55)
          perf, metrics = backtest_equal_weight(Xs)
          assert not perf.empty and "sharpe" in metrics
          print("demo pipeline OK:", metrics)
          EOF
